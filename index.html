<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="SSH Terminal for chenghao.li">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>root@chenghao.li: ~</title>
  <link rel="icon" type="image/x-icon" href="assets/favicon/favicon.ico">
  <link rel="stylesheet" href="css/base.css?v=1.0.0">
  <link rel="stylesheet" href="css/terminal.css?v=1.0.0">
  <link rel="stylesheet" href="css/editors.css?v=1.0.0">
  <link rel="stylesheet" href="css/components.css?v=1.0.0">
</head>

<body>
  <!-- Visually hidden heading for SEO and accessibility -->
  <h1
    style="position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0, 0, 0, 0); border: 0;">
    Chenghao Li - Personal Terminal Portfolio</h1>

  <!-- CRT filter overlays -->
  <div class="crt-overlay crt-overlay-difference"></div>
  <div class="crt-overlay crt-overlay-overlay"></div>
  <div class="scanlines"></div>
  <div class="grid-background"></div>

  <!-- Fullscreen terminal container -->
  <main class="terminal-body" id="terminal-body">
    <!-- Blurred backdrop copy for high-performance screen glow -->
    <div class="terminal-glow-backdrop" id="terminal-glow-backdrop" aria-hidden="true"></div>
    <div class="terminal-output" id="terminal-output">
      <!-- Text output will go here -->
    </div>

    <!-- Active input line -->
    <div class="terminal-input-line" id="input-line">
      <span class="prompt-prefix" id="prompt-prefix"></span>
      <span class="input-container">
        <span class="input-display" id="input-display"></span><span class="terminal-cursor" id="cursor"></span><span
          class="input-placeholder" id="input-placeholder" style="display: none; margin-left: 8px;"><span
            class="placeholder-text">Type (or click ->) '</span><span class="blue cmd-link placeholder-help-link"
            data-cmd="help">help</span><span class="placeholder-text">' to view available terminal
            commands</span></span>
        <!-- Hidden input for typing capturing -->
        <input type="text" id="terminal-input" autocomplete="off" spellcheck="false" autofocus>
      </span>
    </div>
  </main>

  <script type="module" src="js/main.js"></script>
</body>

</html>
