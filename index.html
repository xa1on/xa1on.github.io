<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="SSH Terminal for chenghao.li">
  <title>root@chenghao.li: ~</title>
  <!-- Google Fonts Fira Code -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <!-- CRT filter overlays -->
  <div class="crt-overlay crt-overlay-difference"></div>
  <div class="crt-overlay crt-overlay-overlay"></div>
  <div class="scanlines"></div>
  <div class="screen-flicker"></div>
  <div class="grid-background"></div>

  <!-- Fullscreen terminal container -->
  <main class="terminal-body" id="terminal-body">
    <div class="terminal-output" id="terminal-output">
      <!-- Text output will go here -->
    </div>

    <!-- Active input line -->
    <div class="terminal-input-line" id="input-line">
      <span class="prompt-prefix" id="prompt-prefix"></span>
      <span class="input-container">
        <span class="input-display" id="input-display"></span><span class="terminal-cursor" id="cursor"></span>
        <!-- Hidden input for typing capturing -->
        <input type="text" id="terminal-input" autocomplete="off" spellcheck="false" autofocus>
      </span>
    </div>
  </main>

  <script src="terminal.js"></script>
</body>

</html>
